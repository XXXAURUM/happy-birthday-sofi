<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You - Heart Animation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let fontSize;
        let currentBeatScale = 1;
        

        let mouse = { x: -9999, y: -9999 };


        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resize);


        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX - width / 2;
            mouse.y = e.clientY - height / 2;
        });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX - width / 2;
            mouse.y = e.touches[0].clientY - height / 2;
        });
        const resetMouse = () => { mouse.x = -9999; mouse.y = -9999; };
        window.addEventListener('touchend', resetMouse);
        window.addEventListener('mouseout', resetMouse);


        class Particle {
            constructor(char, targetX, targetY) {
                this.char = char;
                this.tx = targetX; // Целевая позиция X
                this.ty = targetY; // Целевая позиция Y
                

                const angle = Math.random() * Math.PI * 2;
                const radius = Math.max(width, height);
                this.x = Math.cos(angle) * radius;
                this.y = Math.sin(angle) * radius;
                
                // Генерируем оттенки красного и розового
                const hue = 345 + Math.random() * 20; 
                const light = 45 + Math.random() * 25; 
                this.color = `hsl(${hue}, 100%, ${light}%)`;
            }

            update() {

                const scaledX = this.x * currentBeatScale;
                const scaledY = this.y * currentBeatScale;
                const distToMouse = Math.hypot(scaledX - mouse.x, scaledY - mouse.y);

        
                if (distToMouse < 80) {
                    const angle = Math.atan2(scaledY - mouse.y, scaledX - mouse.x);
                    const force = (80 - distToMouse) * 0.2;
                    this.x += (Math.cos(angle) * force) / currentBeatScale;
                    this.y += (Math.sin(angle) * force) / currentBeatScale;
                } else {
                
                    const dx = this.tx - this.x;
                    const dy = this.ty - this.y;
                    this.x += dx * 0.06;
                    this.y += dy * 0.06;
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillText(this.char, this.x, this.y);
            }
        }

    
        function initParticles() {
            particles = [];
            const message = "I LOVE YOU ";
            let msgIndex = 0;
            

            fontSize = Math.max(10, Math.min(width, height) / 45);
            const scale = Math.min(width, height) / 2.5; 


            for(let y = -scale * 1.3; y <= scale * 1.3; y += fontSize) {
                for(let x = -scale * 1.3; x <= scale * 1.3; x += fontSize * 0.6) {

                    const mx = x / scale;
                    const my = -y / scale; 
                    
  
                    const eq = Math.pow(mx*mx + my*my - 1, 3) - (mx*mx) * (my*my*my);
                    
                    if (eq <= 0) {
                        const char = message[msgIndex % message.length];
                        msgIndex++;
                        particles.push(new Particle(char, x, y));
                    }
                }
            }
        }

        const startTime = Date.now();

 
        function animate() {
     
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
            gradient.addColorStop(0, 'rgba(30, 0, 5, 0.3)'); // Темно-бордовый в центре
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');  // Черный по краям
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            const t = (Date.now() - startTime) / 1000;
            currentBeatScale = 1;
            
            // Запускаем пульсацию сердца через 2 секунды (когда буквы соберутся)
            if (t > 2) {
                const cycle = (t - 2) % 1.5; // Длительность одного удара сердца
                if (cycle < 0.15) {
                    currentBeatScale = 1 + Math.sin(cycle * Math.PI / 0.15) * 0.12; // Первый сильный удар
                } else if (cycle < 0.35) {
                    currentBeatScale = 1 + Math.sin((cycle - 0.15) * Math.PI / 0.2) * 0.06; // Второй слабый удар
                }
            }

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(currentBeatScale, currentBeatScale);

            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Небольшое свечение для текста
            ctx.shadowColor = '#ff2a4b';
            ctx.shadowBlur = 4;

            // Обновляем и рисуем каждую букву
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            ctx.restore();
            requestAnimationFrame(animate);
        }

        // Запуск
        resize();
        animate();
    </script>
</body>
</html>
